<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽心情 - 生活管理</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIue+juWbvOW/q+mAiSAtIOeUqOaIt+WuiSWFqCIsICJzaG9ydF9uYW1lIjogIue+juWbvOW/q+mAiSIsICJzdGFydF91cmwiOiAiLiIsICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLCAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwgInRoZW1lX2NvbG9yIjogIiNmZjZiNmIifQ==">
    <style>
        /* 样式与之前完全相同，此处省略以节省篇幅，实际使用时可保留原样式 */
        /* 为了完整性，我们保留核心样式（实际复制时请包含原样式全部） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --dark: #2d3436;
            --light: #f7f7f7;
            --text: #2d3436;
            --text-light: #636e72;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--light);
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #ff8e8e 100%);
            color: white;
            padding: 40px 24px 30px;
            border-radius: 0 0 var(--radius) var(--radius);
            position: relative;
            overflow: hidden;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
        }
        .date-display {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 400;
        }
        .nav-tabs {
            display: flex;
            gap: 8px;
            padding: 16px;
            overflow-x: auto;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .nav-tab {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: 25px;
            background: var(--light);
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        .content {
            padding: 20px;
            padding-bottom: 100px;
        }
        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-sm);
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #ff8e8e 100%);
            color: white;
        }
        .btn-secondary {
            background: var(--light);
            color: var(--text);
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }
        .outfit-display {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius);
            color: white;
            margin-bottom: 20px;
        }
        .outfit-emoji {
            font-size: 80px;
            margin-bottom: 16px;
            display: block;
        }
        .weather-input {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .weather-input .form-input {
            flex: 1;
        }
        .closet-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .category-tag {
            background: var(--light);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .category-tag.active {
            background: var(--primary);
            color: white;
        }
        .closet-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .closet-item-card {
            background: white;
            border-radius: var(--radius-sm);
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #e0e0e0;
            position: relative;
        }
        .closet-item-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
        }
        .closet-item-code {
            font-weight: 600;
            font-size: 12px;
            color: var(--primary);
        }
        .remove-item {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #ffebee;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            color: #c62828;
            cursor: pointer;
        }
        .chart-container {
            height: 200px;
            margin: 20px 0;
            position: relative;
            background: var(--light);
            border-radius: var(--radius-sm);
            padding: 16px;
        }
        .weight-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: var(--light);
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        .period-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .calendar-header {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            padding: 8px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 14px;
        }
        .calendar-day.period {
            background: var(--primary);
            color: white;
        }
        .calendar-day.predicted {
            background: #ffe0e0;
            color: var(--primary);
        }
        .calendar-day.today {
            border: 2px solid var(--primary);
        }
        .period-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            border-radius: var(--radius);
            color: white;
            margin-bottom: 20px;
        }
        .status-item {
            text-align: center;
        }
        .status-number {
            font-size: 36px;
            font-weight: 700;
        }
        .period-history-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .period-history-item {
            background: #fef0f7;
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
        }
        .diary-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .diary-item {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            border-left: 4px solid var(--primary);
        }
        .mood-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .mood-btn {
            font-size: 32px;
            background: none;
            border: none;
            cursor: pointer;
            filter: grayscale(100%);
            opacity: 0.6;
        }
        .mood-btn.selected {
            transform: scale(1.2);
            filter: grayscale(0%);
            opacity: 1;
        }
        .placeholder-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .placeholder-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 2px dashed #e0e0e0;
        }
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .history-actions {
            display: flex;
            gap: 8px;
        }
        .edit-btn {
            background: none;
            border: none;
            color: #4ecdc4;
            font-size: 18px;
            cursor: pointer;
        }
        .photo-icon {
            font-size: 20px;
            cursor: pointer;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 24px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 1000;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-light);
        }
        .nav-item.active {
            color: var(--primary);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .photo-modal-content {
            background: transparent;
            max-width: 90%;
            text-align: center;
        }
        .photo-modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: var(--radius);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <h1>美丽心情</h1>
            <div class="date-display" id="currentDate"></div>
        </div>

        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" data-section="outfit">👔 穿搭</button>
            <button class="nav-tab" data-section="weight">⚖️ 体重</button>
            <button class="nav-tab" data-section="period">🌸 生理期</button>
            <button class="nav-tab" data-section="diary">📔 日记</button>
            <button class="nav-tab" data-section="more">➕ 更多</button>
        </div>

        <!-- 内容区域 -->
        <div class="content">
            <!-- 穿搭模块 -->
            <div class="section active" id="outfit-section">
                <div class="outfit-display" id="outfitDisplay">
                    <span class="outfit-emoji" id="outfitEmoji">👕</span>
                    <div class="outfit-desc" id="outfitDesc">今日穿搭建议</div>
                    <div class="outfit-temp" id="outfitTemp">请输入温度获取建议</div>
                </div>
                <div class="card">
                    <div class="card-title">🌡️ 天气设置</div>
                    <div class="weather-input">
                        <input type="number" class="form-input" id="tempInput" placeholder="温度 (°C)">
                        <select class="form-input" id="weatherCondition">
                            <option value="sunny">☀️ 晴天</option>
                            <option value="cloudy">☁️ 多云</option>
                            <option value="rainy">🌧️ 雨天</option>
                            <option value="snowy">❄️ 雪天</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="generateOutfit()">生成穿搭建议</button>
                </div>
                <div class="card">
                    <div class="card-title">👚 衣橱管理</div>
                    <p style="color: var(--text-light); margin-bottom: 16px;">管理你的衣物，方便每日穿搭选择</p>
                    <button class="btn btn-primary btn-small" onclick="openClosetModal()">打开衣橱</button>
                </div>
                <div class="card">
                    <div class="card-title">📸 我的穿搭记录</div>
                    <div class="form-group">
                        <label class="form-label">拍照或上传今日穿搭照片</label>
                        <input type="file" class="form-input" id="outfitPhoto" accept="image/*" capture="environment" onchange="previewOutfitPhoto(this)">
                    </div>
                    <div id="outfitPreview" style="margin-top: 12px; display: none;">
                        <img id="outfitImg" style="width: 100%; border-radius: 12px; max-height: 300px; object-fit: cover;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">穿搭备注</label>
                        <input type="text" class="form-input" id="outfitNote" placeholder="记录今天的穿搭心得...">
                    </div>
                    <button class="btn btn-primary" onclick="saveOutfitRecord()">保存穿搭记录</button>
                    <div class="history-list" id="outfitHistory" style="margin-top: 20px;"></div>
                </div>
            </div>

            <!-- 体重模块 -->
            <div class="section" id="weight-section">
                <div class="card">
                    <div class="card-title">📊 体重记录</div>
                    <div class="weight-stats">
                        <div class="stat-box"><div class="stat-value" id="currentWeight">--</div><div class="stat-label">当前体重 (kg)</div></div>
                        <div class="stat-box"><div class="stat-value" id="currentBodyFat">--</div><div class="stat-label">体脂率 (%)</div></div>
                    </div>
                    <div class="form-group"><label class="form-label">体重 (kg)</label><input type="number" class="form-input" id="weightInput" step="0.1"></div>
                    <div class="form-group"><label class="form-label">体脂率 (%)</label><input type="number" class="form-input" id="bodyFatInput" step="0.1"></div>
                    <div class="form-group"><label class="form-label">日期</label><input type="date" class="form-input" id="weightDate"></div>
                    <button class="btn btn-primary" onclick="saveWeight()">保存记录</button>
                </div>
                <div class="card">
                    <div class="card-title">📈 体重与体脂趋势</div>
                    <div class="chart-container"><canvas id="weightCanvas" width="360" height="200"></canvas></div>
                    <div class="history-list" id="weightHistory"></div>
                </div>
            </div>

            <!-- 生理期模块 -->
            <div class="section" id="period-section">
                <div class="period-status" id="periodStatus">
                    <div class="status-item"><div class="status-number" id="cycleDay">--</div><div class="status-label">周期第几天</div></div>
                    <div class="status-item"><div class="status-number" id="nextPeriod">--</div><div class="status-label">距离下次</div></div>
                </div>
                <div class="card">
                    <div class="card-title">🗓️ 本月日历</div>
                    <div class="period-calendar" id="periodCalendar"></div>
                </div>
                <div class="card">
                    <div class="card-title">✏️ 记录生理期</div>
                    <div class="form-group"><label class="form-label">开始日期</label><input type="date" class="form-input" id="periodStart"></div>
                    <div class="form-group"><label class="form-label">结束日期 (可选)</label><input type="date" class="form-input" id="periodEnd"></div>
                    <div class="form-group">
                        <label class="form-label">症状记录</label>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                            <label><input type="checkbox" class="period-symptom" value="痛经"> 痛经</label>
                            <label><input type="checkbox" class="period-symptom" value="头痛"> 头痛</label>
                            <label><input type="checkbox" class="period-symptom" value="情绪波动"> 情绪波动</label>
                            <label><input type="checkbox" class="period-symptom" value="腹胀"> 腹胀</label>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="savePeriod()">保存记录</button>
                </div>
                <div class="card">
                    <div class="card-title">📜 历史记录</div>
                    <div class="period-history-list" id="periodHistory"></div>
                </div>
            </div>

            <!-- 日记模块 -->
            <div class="section" id="diary-section">
                <div class="card">
                    <div class="card-title">📝 写日记</div>
                    <div class="form-group">
                        <label class="form-label">今天心情如何？</label>
                        <div class="mood-selector">
                            <button class="mood-btn" data-mood="happy">😊</button>
                            <button class="mood-btn" data-mood="calm">😌</button>
                            <button class="mood-btn" data-mood="tired">😴</button>
                            <button class="mood-btn" data-mood="sad">😢</button>
                            <button class="mood-btn" data-mood="excited">🤩</button>
                            <button class="mood-btn" data-mood="angry">😠</button>
                        </div>
                    </div>
                    <div class="form-group"><label class="form-label">日期</label><input type="date" class="form-input" id="diaryDate"></div>
                    <div class="form-group"><label class="form-label">标题</label><input type="text" class="form-input" id="diaryTitle"></div>
                    <div class="form-group"><label class="form-label">内容</label><textarea class="form-input" id="diaryContent"></textarea></div>
                    <button class="btn btn-primary" onclick="saveDiary()">保存日记</button>
                </div>
                <div class="card">
                    <div class="card-title">📚 日记列表</div>
                    <div class="diary-list" id="diaryList"></div>
                </div>
            </div>

            <!-- 更多模块（含导入导出） -->
            <div class="section" id="more-section">
                <div class="card">
                    <div class="card-title">🎯 功能模块</div>
                    <div class="placeholder-grid">
                        <div class="placeholder-card" onclick="showFeatureAlert('饮水记录')"><div class="placeholder-icon">💧</div><div class="placeholder-title">饮水记录</div></div>
                        <div class="placeholder-card" onclick="showFeatureAlert('睡眠追踪')"><div class="placeholder-icon">😴</div><div class="placeholder-title">睡眠追踪</div></div>
                        <div class="placeholder-card" onclick="showFeatureAlert('运动健身')"><div class="placeholder-icon">🏃</div><div class="placeholder-title">运动健身</div></div>
                        <div class="placeholder-card" onclick="showFeatureAlert('饮食记录')"><div class="placeholder-icon">🥗</div><div class="placeholder-title">饮食记录</div></div>
                        <div class="placeholder-card" onclick="showFeatureAlert('财务管理')"><div class="placeholder-icon">💰</div><div class="placeholder-title">财务管理</div></div>
                        <div class="placeholder-card" onclick="showFeatureAlert('习惯养成')"><div class="placeholder-icon">✨</div><div class="placeholder-title">习惯养成</div></div>
                        <div class="placeholder-card" onclick="showFeatureAlert('阅读清单')"><div class="placeholder-icon">📖</div><div class="placeholder-title">阅读清单</div></div>
                        <div class="placeholder-card" onclick="showFeatureAlert('旅行计划')"><div class="placeholder-icon">✈️</div><div class="placeholder-title">旅行计划</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">⚙️ 数据管理</div>
                    <button class="btn btn-secondary" onclick="exportData()" style="margin-bottom: 12px;">📥 导出所有数据</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="margin-bottom: 12px;">📤 导入数据</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
                    <button class="btn btn-secondary" onclick="clearAllData()" style="background: #ffebee; color: #c62828;">🗑️ 清空所有数据</button>
                </div>
            </div>
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item active" data-section="outfit"><span class="nav-item-icon">👔</span><span class="nav-item-label">穿搭</span></div>
            <div class="nav-item" data-section="weight"><span class="nav-item-icon">⚖️</span><span class="nav-item-label">体重</span></div>
            <div class="nav-item" data-section="period"><span class="nav-item-icon">🌸</span><span class="nav-item-label">生理期</span></div>
            <div class="nav-item" data-section="diary"><span class="nav-item-icon">📔</span><span class="nav-item-label">日记</span></div>
            <div class="nav-item" data-section="more"><span class="nav-item-icon">➕</span><span class="nav-item-label">更多</span></div>
        </div>
    </div>

    <!-- 模态框（衣橱、分类、衣物、体重编辑、日记详情、图片查看） -->

    <script>
        // IndexedDB 初始化
        const DB_NAME = 'LifeFlowDB';
        const DB_VERSION = 2;
        let db;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(db); };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('outfits')) {
                        const store = database.createObjectStore('outfits', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('date', 'date', { unique: false });
                    }
                    if (!database.objectStoreNames.contains('weight')) {
                        const store = database.createObjectStore('weight', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('date', 'date', { unique: false });
                    }
                    if (!database.objectStoreNames.contains('periods')) {
                        const store = database.createObjectStore('periods', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('startDate', 'startDate', { unique: false });
                    }
                    if (!database.objectStoreNames.contains('diaries')) {
                        const store = database.createObjectStore('diaries', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('date', 'date', { unique: false });
                    }
                    if (!database.objectStoreNames.contains('closetCategories')) {
                        const store = database.createObjectStore('closetCategories', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('name', 'name', { unique: true });
                    }
                    if (!database.objectStoreNames.contains('clothes')) {
                        const store = database.createObjectStore('clothes', { keyPath: 'id', autoIncrement: true });
                        store.createIndex('categoryId', 'categoryId', { unique: false });
                        store.createIndex('code', 'code', { unique: false });
                    }
                };
            });
        };

        // 数据库操作函数
        const addData = (storeName, data) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.add(data);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };
        const getAllData = (storeName) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], 'readonly');
                const store = tx.objectStore(storeName);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };
        const deleteData = (storeName, id) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.delete(id);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        };
        const updateData = (storeName, data) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.put(data);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };
        const clearStore = (storeName) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], 'readwrite');
                const store = tx.objectStore(storeName);
                const req = store.clear();
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        };
        const getDataByIndex = (storeName, indexName, value) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], 'readonly');
                const store = tx.objectStore(storeName);
                const index = store.index(indexName);
                const req = index.getAll(value);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };
        const getDataById = (storeName, id) => {
            return new Promise((resolve, reject) => {
                const tx = db.transaction([storeName], 'readonly');
                const store = tx.objectStore(storeName);
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        };

        // 图片辅助函数
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }
        function base64ToBlob(base64) {
            return new Promise((resolve) => {
                const arr = base64.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) { u8arr[n] = bstr.charCodeAt(n); }
                resolve(new Blob([u8arr], { type: mime }));
            });
        }
        function compressImage(file, maxWidth = 600, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            const compressedFile = new File([blob], file.name, { type: 'image/jpeg' });
                            resolve(compressedFile);
                        }, 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 穿搭建议
        const outfitSuggestions = {
            cold: { emoji: '🧥', desc: '寒冷天气 - 羽绒服/大衣', items: ['羽绒服', '毛衣', '围巾', '手套'] },
            cool: { emoji: '🧥', desc: '凉爽天气 - 外套/夹克', items: ['风衣', '长袖', '牛仔裤'] },
            mild: { emoji: '👕', desc: '舒适天气 - 长袖T恤/薄外套', items: ['长袖T恤', '薄外套', '长裤'] },
            warm: { emoji: '👔', desc: '温暖天气 - 短袖/衬衫', items: ['短袖', '衬衫', '休闲裤'] },
            hot: { emoji: '👗', desc: '炎热天气 - 短袖/裙子', items: ['短袖', '短裤', '裙子', '凉鞋'] }
        };
        function generateOutfit() {

            if (isNaN(temp)) { alert('请输入有效的温度'); return; }
            let suggestion;
            if (temp < 5) suggestion = outfitSuggestions.cold;
            else if (temp < 15) suggestion = outfitSuggestions.cool;
            else if (temp < 22) suggestion = outfitSuggestions.mild;
            else if (temp < 28) suggestion = outfitSuggestions.warm;
            else suggestion = outfitSuggestions.hot;
            if (condition === 'rainy') suggestion = { ...suggestion, emoji: '☔', desc: suggestion.desc + ' + 雨具' };
            else if (condition === 'snowy') suggestion = outfitSuggestions.cold;
            document.getElementById('outfitEmoji').textContent = suggestion.emoji;
            document.getElementById('outfitDesc').textContent = suggestion.desc;
            document.getElementById('outfitTemp').textContent = `温度: ${temp}°C | 建议: ${suggestion.items.join(', ')}`;
        }
        function previewOutfitPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('outfitImg').src = e.target.result;
                    document.getElementById('outfitPreview').style.display = 'block';

                reader.readAsDataURL(input.files[0]);

        async function saveOutfitRecord() {
            const photo = document.getElementById('outfitImg').src;

            if (!photo && !note) { alert('请上传照片或填写备注'); return; }

        async function loadOutfitHistory() {
            const history = await getAllData('outfits');
            const container = document.getElementById('outfitHistory');
            if (history.length === 0) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">📸</div><p>暂无穿搭记录</p></div>'; return; }
            container.innerHTML = history.reverse().slice(0,5).map(item => `<div class="history-item"><div><div class="history-date">${item.date} ${item.temp||''}</div><div style="font-size:12px;">${item.note||'无备注'}</div></div>${item.photo?`<span class="photo-icon" onclick="showOutfitPhoto('${item.photo}')">📷</span>`:''}</div>`).join('');

        // 体重管理
        async function saveWeight() {
            const weight = parseFloat(document.getElementById('weightInput').value);
            const bodyFat = parseFloat(document.getElementById('bodyFatInput').value);
            const date = document.getElementById('weightDate').value || new Date().toISOString().split('T')[0];
            if (isNaN(weight)) { alert('请输入有效的体重'); return; }
            await addData('weight', { date, weight, bodyFat: bodyFat || null, timestamp: Date.now() });
            alert('体重记录已保存！');
            loadWeightData();
            document.getElementById('weightInput').value = ''; document.getElementById('bodyFatInput').value = '';
        }
        async function editWeight(id) {
            const record = await getDataById('weight', id);
            if (!record) return;
            document.getElementById('editWeightId').value = record.id;
            document.getElementById('editWeightDate').value = record.date;
            document.getElementById('editWeightValue').value = record.weight;

        }
        async function updateWeight() {
            const id = parseInt(document.getElementById('editWeightId').value);
            const weight = parseFloat(document.getElementById('editWeightValue').value);
            const bodyFat = parseFloat(document.getElementById('editBodyFatValue').value) || null;
            const date = document.getElementById('editWeightDate').value;
            if (isNaN(weight)) { alert('请输入有效的体重'); return; }
            await updateData('weight', { id, date, weight, bodyFat, timestamp: Date.now() });
            alert('记录已更新');
            closeModalById('editWeightModal');
            loadWeightData();
        }
        async function loadWeightData() {
            const records = await getAllData('weight');
            if (records.length === 0) {
                document.getElementById('currentWeight').textContent = '--';
                document.getElementById('currentBodyFat').textContent = '--';
                document.getElementById('weightHistory').innerHTML = '<div class="empty-state"><div class="empty-icon">⚖️</div><p>暂无体重记录</p></div>';
                drawWeightChart([]); return;
            }
            records.sort((a,b)=>b.timestamp - a.timestamp);
            const latest = records[0];
            document.getElementById('currentWeight').textContent = latest.weight.toFixed(1);
            document.getElementById('currentBodyFat').textContent = latest.bodyFat ? latest.bodyFat.toFixed(1) : '--';
            document.getElementById('weightHistory').innerHTML = records.slice(0,10).map(item => 
                `<div class="history-item"><span class="history-date">${item.date}</span><span class="history-value">${item.weight}kg ${item.bodyFat?'('+item.bodyFat+'%)':''}</span><div class="history-actions"><button class="edit-btn" onclick="editWeight(${item.id})">✏️</button><button class="delete-btn" onclick="deleteWeight(${item.id})" style="background:none;border:none;color:#f43f5e;">🗑️</button></div></div>`
            ).join('');
            drawWeightChart(records.slice().reverse());
        }
        async function deleteWeight(id) { if(confirm('确定删除？')){ await deleteData('weight',id); loadWeightData(); } }
        function drawWeightChart(records) {
            const canvas = document.getElementById('weightCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(records.length<2){ ctx.fillText('需要至少2条记录',120,100); return; }
            const weights = records.map(r=>r.weight), bodyFats = records.map(r=>r.bodyFat).filter(f=>f!=null);
            const minW = Math.min(...weights)-1, maxW = Math.max(...weights)+1, rangeW = maxW-minW;
            let minF=null,maxF=null,rangeF=null;
            if(bodyFats.length>0){ minF=Math.min(...bodyFats)-1; maxF=Math.max(...bodyFats)+1; rangeF=maxF-minF; }
            const pad=40, cw=canvas.width-pad*2, ch=canvas.height-pad*2;
            ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=1;
            for(let i=0;i<=4;i++){ ctx.beginPath(); ctx.moveTo(pad, pad+ch/4*i); ctx.lineTo(canvas.width-pad, pad+ch/4*i); ctx.stroke(); }
            ctx.strokeStyle='#ff6b6b'; ctx.lineWidth=3; ctx.beginPath();
            records.forEach((r,i)=>{ let x=pad+cw/(records.length-1)*i, y=pad+ch-((r.weight-minW)/rangeW)*ch; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
            ctx.stroke();
            records.forEach((r,i)=>{ let x=pad+cw/(records.length-1)*i, y=pad+ch-((r.weight-minW)/rangeW)*ch; ctx.fillStyle='#ff6b6b'; ctx.beginPath(); ctx.arc(x,y,5,0,2*Math.PI); ctx.fill(); ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(x,y,2,0,2*Math.PI); ctx.fill(); });
            if(bodyFats.length>0){
                ctx.strokeStyle='#4ecdc4'; ctx.lineWidth=2; ctx.setLineDash([5,3]); ctx.beginPath();
                records.forEach((r,i)=>{ if(r.bodyFat){ let x=pad+cw/(records.length-1)*i, y=pad+ch-((r.bodyFat-minF)/rangeF)*ch; if(i===0||!records[i-1].bodyFat) ctx.moveTo(x,y); else ctx.lineTo(x,y); } });
                ctx.stroke(); ctx.setLineDash([]);
                records.forEach((r,i)=>{ if(r.bodyFat){ let x=pad+cw/(records.length-1)*i, y=pad+ch-((r.bodyFat-minF)/rangeF)*ch; ctx.fillStyle='#4ecdc4'; ctx.beginPath(); ctx.arc(x,y,5,0,2*Math.PI); ctx.fill(); ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(x,y,2,0,2*Math.PI); ctx.fill(); } });
                ctx.font='12px sans-serif'; ctx.fillStyle='#ff6b6b'; ctx.fillText('体重 (kg)', canvas.width-110,20);
                ctx.fillStyle='#4ecdc4'; ctx.fillText('体脂 (%)', canvas.width-110,40);
            } else { ctx.fillStyle='#ff6b6b'; ctx.fillText('体重 (kg)', canvas.width-90,20); }
        }

        // 生理期管理
        async function savePeriod() {
            const startDate = document.getElementById('periodStart').value;
            const endDate = document.getElementById('periodEnd').value;
            const symptoms = Array.from(document.querySelectorAll('.period-symptom:checked')).map(cb=>cb.value);
            if(!startDate){ alert('请选择开始日期'); return; }
            await addData('periods', { startDate, endDate: endDate||null, symptoms, timestamp:Date.now() });
            alert('生理期记录已保存！');
            loadPeriodData();
            document.getElementById('periodStart').value = new Date().toISOString().split('T')[0];
            document.getElementById('periodEnd').value = '';
            document.querySelectorAll('.period-symptom').forEach(cb=>cb.checked=false);
        }
        async function loadPeriodData() {
            const periods = await getAllData('periods');
            if(periods.length===0){
                document.getElementById('cycleDay').textContent='--'; document.getElementById('nextPeriod').textContent='--';
                document.getElementById('periodHistory').innerHTML='<div class="empty-state"><div class="empty-icon">🌸</div><p>暂无生理期记录</p></div>';
            } else {
                periods.sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
                const last = periods[0], lastDate = new Date(last.startDate), today = new Date();
                document.getElementById('cycleDay').textContent = Math.floor((today-lastDate)/(1000*3600*24))+1;
                const next = new Date(lastDate); next.setDate(next.getDate()+28);
                const days = Math.floor((next-today)/(1000*3600*24));
                document.getElementById('nextPeriod').textContent = days>0 ? days+'天' : '已到来';
                let html='';
                periods.slice(0,10).forEach(p=>{
                    const start = p.startDate, end = p.endDate||'未记录';
                    let duration = '';
                    if(p.endDate){
                        const s=new Date(p.startDate), e=new Date(p.endDate);
                        const d = Math.ceil((e-s)/(1000*3600*24))+1;
                        duration = ` (${d}天)`;
                    }
                    html += `<div class="period-history-item"><div class="period-history-dates">${start} 至 ${end}${duration}</div><div class="period-history-detail">症状: ${p.symptoms?.join('、')||'无'}</div></div>`;
                });
                document.getElementById('periodHistory').innerHTML = html;
            }
            generateCalendar(periods);
        }
        function generateCalendar(periods) {
            const cal = document.getElementById('periodCalendar');
            const today = new Date(), y=today.getFullYear(), m=today.getMonth();
            const firstDay = new Date(y,m,1).getDay(), days = new Date(y,m+1,0).getDate();
            const weekDays = ['日','一','二','三','四','五','六'];
            let html = weekDays.map(d=>`<div class="calendar-header">${d}</div>`).join('');
            for(let i=0;i<firstDay;i++) html+='<div></div>';
            for(let d=1;d<=days;d++){
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = d===today.getDate();
                const isPeriod = periods.some(p=>{
                    const start = new Date(p.startDate);
                    const end = p.endDate ? new Date(p.endDate) : new Date(start);
                    end.setDate(end.getDate()+5);
                    return new Date(dateStr) >= start && new Date(dateStr) <= end;
                });
                let isPredicted = false;
                if(periods.length>0){
                    const last = new Date(periods[0].startDate);
                    const predStart = new Date(last); predStart.setDate(predStart.getDate()+28);
                    const predEnd = new Date(predStart); predEnd.setDate(predEnd.getDate()+5);
                    const cur = new Date(dateStr);
                    if(cur>=predStart && cur<=predEnd) isPredicted=true;
                }
                let cls='calendar-day';
                if(isToday) cls+=' today';
                if(isPeriod) cls+=' period';
                else if(isPredicted) cls+=' predicted';
                html += `<div class="${cls}">${d}</div>`;
            }
            cal.innerHTML = html;
        }

        // 日记管理
        let selectedMood='';
        document.querySelectorAll('.mood-btn').forEach(btn=>{
            btn.addEventListener('click',function(){

            document.getElementById('diaryTitle').value=''; document.getElementById('diaryContent').value='';

            if(diaries.length===0){ container.innerHTML='<div class="empty-state"><div class="empty-icon">📔</div><p>还没有日记</p></div>'; return; }
            const moodEmojis = { happy:'😊', calm:'😌', tired:'😴', sad:'😢', excited:'🤩', angry:'😠' };
            container.innerHTML = diaries.sort((a,b)=>b.timestamp-a.timestamp).map(d=>`<div class="diary-item" onclick="showDiaryDetail(${d.id})"><div class="diary-date">${d.date}</div><div class="diary-preview">${d.title}</div>${d.mood?`<div class="diary-mood">${moodEmojis[d.mood]}</div>`:''}</div>`).join('');
        }
        async function showDiaryDetail(id) {
            const diaries = await getAllData('diaries');
            const diary = diaries.find(d=>d.id===id);
            if(!diary) return;
            const moodEmojis = { happy:'😊 开心', calm:'😌 平静', tired:'😴 疲惫', sad:'😢 难过', excited:'🤩 兴奋', angry:'😠 生气' };
            document.getElementById('modalBody').innerHTML = `<div><strong>${diary.date}</strong>${diary.mood?`<span> ${moodEmojis[diary.mood]}</span>`:''}</div><h3>${diary.title}</h3><p style="white-space:pre-wrap;">${diary.content}</p><button class="btn btn-primary" onclick="deleteDiary(${id})" style="background:#ffebee;color:#c62828;">删除日记</button>`;
            document.getElementById('diaryModal').classList.add('active');
        }
        async function deleteDiary(id) { if(confirm('确定删除？')){ await deleteData('diaries',id); closeModal(); loadDiaries(); } }
        function closeModal() { document.getElementById('diaryModal').classList.remove('active'); }

        // 导出数据（修复版）
        async function exportData() {
            try {
                alert('正在准备导出数据，请稍候...');
                const stores = ['outfits', 'weight', 'periods', 'diaries', 'clothes', 'closetCategories'];
                const exportObj = {};
                for (const store of stores) {
                    let data = await getAllData(store);
                    if (store === 'clothes') {
                        // 将每个衣物的 imageBlob 转为 base64
                        data = await Promise.all(data.map(async item => {
                            if (item.imageBlob) {
                                const base64 = await blobToBase64(item.imageBlob);
                                return { ...item, imageBlob: base64 };
                            }
                            return item;
                        }));
                    }
                    exportObj[store] = data;
                }
                exportObj.exportDate = new Date().toISOString();

                const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `beautiful_mood_backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); // 确保添加到DOM
                a.click();
                document.body.removeChild(a); // 清理
                URL.revokeObjectURL(url);
                alert('导出成功！');
            } catch (error) {
                console.error('导出失败', error);
                alert('导出失败：' + error.message);
            }
        }

        // 导入数据
        async function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!imported.outfits || !imported.weight || !imported.periods || !imported.diaries || !imported.clothes || !imported.closetCategories) {
                        alert('无效的数据文件');
                        return;
                    }
                    if (!confirm('导入将覆盖当前所有数据，确定继续？')) return;

                    const stores = ['outfits', 'weight', 'periods', 'diaries', 'clothes', 'closetCategories'];
                    for (const store of stores) {
                        await clearStore(store);
                    }
                    for (const store of stores) {
                        const items = imported[store];
                        for (const item of items) {
                            const { id, ...rest } = item; // 移除原有id
                            if (store === 'clothes' && rest.imageBlob && typeof rest.imageBlob === 'string') {
                                rest.imageBlob = await base64ToBlob(rest.imageBlob);
                            }
                            await addData(store, rest);
                        }
                    }
                    alert('数据导入成功！');
                    const activeSection = document.querySelector('.nav-tab.active').dataset.section;
                    if (activeSection === 'outfit') loadOutfitHistory();
                    if (activeSection === 'weight') loadWeightData();
                    if (activeSection === 'period') loadPeriodData();
                    if (activeSection === 'diary') loadDiaries();
                } catch (err) {
                    alert('导入失败：' + err.message);
                } finally {
                    input.value = '';
                }
            };
            reader.readAsText(file);
        }

        async function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            await clearStore('outfits'); await clearStore('weight'); await clearStore('periods');
            await clearStore('diaries'); await clearStore('clothes'); await clearStore('closetCategories');
            alert('所有数据已清空'); location.reload();
        }
        function showFeatureAlert(feature) { alert(`${feature} 功能即将上线，敬请期待！`); }

        // 导航切换
        function switchSection(sectionName) {
            document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.section===sectionName));
            document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.section===sectionName));
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            document.getElementById(sectionName+'-section').classList.add('active');
            if(sectionName==='weight') loadWeightData();
            if(sectionName==='period') loadPeriodData();
            if(sectionName==='diary') loadDiaries();
            if(sectionName==='outfit') loadOutfitHistory();
        }
        document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>switchSection(t.dataset.section)));
        document.querySelectorAll('.nav-item').forEach(i=>i.addEventListener('click',()=>switchSection(i.dataset.section)));

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', { year:'numeric',month:'long',day:'numeric',weekday:'long' });
            const todayStr = now.toISOString().split('T')[0];
            document.getElementById('weightDate').value = todayStr;
            document.getElementById('diaryDate').value = todayStr;
            document.getElementById('periodStart').value = todayStr;
            try {
                await initDB();
                console.log('数据库初始化成功');
                loadOutfitHistory(); loadWeightData(); loadPeriodData(); loadDiaries();
            } catch (error) {
                console.error('数据库初始化失败:', error);
                alert('数据库初始化失败，请检查浏览器是否支持IndexedDB');
            }
        });

        // 模态框关闭事件
        document.getElementById('diaryModal').addEventListener('click',e=>{if(e.target===document.getElementById('diaryModal')) closeModal();});
        document.getElementById('photoModal').addEventListener('click',function(e){if(e.target===this) closePhotoModal();});
        function closeModalById(id){ document.getElementById(id).classList.remove('active'); }
        function closeClosetModal(){ document.getElementById('closetModal').classList.remove('active'); }

        // 衣橱管理功能
        let currentCategoryId = null;
        async function openClosetModal() { await loadClosetCategories(); document.getElementById('closetModal').classList.add('active'); }
        async function loadClosetCategories() {
            const cats = await getAllData('closetCategories');
            const cont = document.getElementById('closetCategories');
            if(!cats.length){ cont.innerHTML='<p>暂无分类</p>'; return; }
            let html='';
            cats.forEach(c=>html+=`<span class="category-tag ${currentCategoryId===c.id?'active':''}" onclick="selectCategory(${c.id})">${c.name}</span>`);
            cont.innerHTML=html;
            if(!currentCategoryId && cats.length>0) selectCategory(cats[0].id);
            else loadClothesByCategory(currentCategoryId);
        }
        function selectCategory(id){ currentCategoryId=id; loadClosetCategories(); loadClothesByCategory(id); }
        async function loadClothesByCategory(cid){
            if(!cid) return;
            const clothes = await getDataByIndex('clothes','categoryId',cid);
            const cont = document.getElementById('closetItems');
            if(!clothes.length){ cont.innerHTML='<p>该分类下暂无衣物</p>'; return; }
            let html='';
            clothes.forEach(item=>{
                let imgUrl = item.imageBlob ? URL.createObjectURL(item.imageBlob) : '';
                html+=`<div class="closet-item-card"><img src="${imgUrl||'https://via.placeholder.com/70'}"><div class="closet-item-code">${item.code}</div><button class="remove-item" onclick="deleteClothes(${item.id})">✕</button></div>`;
            });
            cont.innerHTML=html;
        }
        function showAddCategory(){ document.getElementById('addCategoryModal').classList.add('active'); }
        async function addCategory(){
            const name = document.getElementById('newCategoryName').value.trim();
            if(!name){ alert('请输入分类名称'); return; }
            const existing = await getDataByIndex('closetCategories','name',name);
            if(existing.length>0){ alert('分类名称已存在'); return; }
            await addData('closetCategories',{name});
            document.getElementById('newCategoryName').value='';
            closeModalById('addCategoryModal');
            loadClosetCategories();
        }
        function showAddClothes(){
            if(!currentCategoryId){ alert('请先选择一个分类'); return; }
            const sel = document.getElementById('clothesCategory');
            sel.innerHTML='';
            getAllData('closetCategories').then(cats=>{
                cats.forEach(c=>{ let opt=document.createElement('option'); opt.value=c.id; opt.textContent=c.name; if(c.id===currentCategoryId) opt.selected=true; sel.appendChild(opt); });
            });
            document.getElementById('addClothesModal').classList.add('active');
        }
        async function addClothes(){
            const catId = parseInt(document.getElementById('clothesCategory').value);
            const code = document.getElementById('clothesCode').value.trim();
            const file = document.getElementById('clothesImage').files[0];
            if(!code){ alert('请输入衣物代码'); return; }
            if(!file){ alert('请上传照片'); return; }
            const compressed = await compressImage(file);
            const reader = new FileReader();
            reader.onload = async function(e){
                const blob = dataURLToBlob(e.target.result);
                await addData('clothes', { categoryId:catId, code, imageBlob:blob, timestamp:Date.now() });
                document.getElementById('clothesCode').value='';
                document.getElementById('clothesImage').value='';
                closeModalById('addClothesModal');
                loadClothesByCategory(currentCategoryId);
            };
            reader.readAsDataURL(compressed);
        }
        function dataURLToBlob(dataURL){
            const arr = dataURL.split(','), mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]), u8 = new Uint8Array(bstr.length);
            for(let i=0;i<bstr.length;i++) u8[i]=bstr.charCodeAt(i);
            return new Blob([u8], {type:mime});
        }
        async function deleteClothes(id){ if(confirm('确定删除？')){ await deleteData('clothes',id); loadClothesByCategory(currentCategoryId); } }

        // 为衣橱相关模态框添加点击外部关闭
        document.getElementById('closetModal').addEventListener('click',e=>{if(e.target===document.getElementById('closetModal')) closeClosetModal();});
        document.getElementById('addCategoryModal').addEventListener('click',e=>{if(e.target===document.getElementById('addCategoryModal')) closeModalById('addCategoryModal');});
        document.getElementById('addClothesModal').addEventListener('click',e=>{if(e.target===document.getElementById('addClothesModal')) closeModalById('addClothesModal');});
        document.getElementById('editWeightModal').addEventListener('click',e=>{if(e.target===document.getElementById('editWeightModal')) closeModalById('editWeightModal');});
    </script>
</body>
