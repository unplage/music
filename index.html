<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能资产配置器 Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="number"], input[type="date"], input[type="text"] {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.25rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus, input[type="date"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
        }

        input[type="text"] {
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.875rem;
            width: auto;
            display: inline-block;
        }

        .allocation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .allocation-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .allocation-item:hover {
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .allocation-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .allocation-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .allocation-percent {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .allocation-amount {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-left: 12px;
        }

        .weight-input {
            width: 80px !important;
            padding: 8px 12px !important;
            font-size: 1rem !important;
            text-align: center;
            margin-left: 12px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.4);
        }

        .history-item {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .history-date {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .history-amount {
            font-weight: 700;
            color: var(--success);
        }

        .rebalance-section {
            margin-top: 32px;
        }

        .current-holdings {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .holding-input {
            display: flex;
            flex-direction: column;
        }

        .holding-input label {
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .holding-input input {
            padding: 12px;
            font-size: 1rem;
        }

        .rebalance-result {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 24px;
            margin-top: 24px;
        }

        .rebalance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .rebalance-item:last-child {
            border-bottom: none;
        }

        .action-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .action-buy {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .action-sell {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .action-hold {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 640px) {
            .container {
                padding: 12px;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .current-holdings {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .allocation-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--success);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .weight-editor {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .weight-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .weight-item:last-child {
            border-bottom: none;
        }

        .weight-total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }

        .weight-total.valid {
            color: var(--success);
        }

        .weight-total.invalid {
            color: var(--danger);
        }

        .preset-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .preset-btn:hover {
            background: var(--primary);
            color: white;
        }

        .section-title {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .custom-scheme-name {
            margin-bottom: 16px;
        }

        .saved-schemes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .scheme-tag {
            padding: 8px 16px;
            background: rgba(6, 182, 212, 0.2);
            border: 1px solid var(--info);
            color: var(--info);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .scheme-tag:hover {
            background: var(--info);
            color: white;
        }

        .scheme-tag .delete {
            font-weight: bold;
            opacity: 0.6;
        }

        .scheme-tag .delete:hover {
            opacity: 1;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: var(--border);
            border-radius: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle.active {
            background: var(--primary);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle.active::after {
            left: 27px;
        }

        .toggle-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>智能资产配置器 Pro</h1>
            <p class="subtitle">支持自定义权重的全球投资组合管理工具</p>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('invest')">新增投资</div>
            <div class="tab" onclick="switchTab('rebalance')">再平衡</div>
            <div class="tab" onclick="switchTab('history')">历史记录</div>
            <div class="tab" onclick="switchTab('settings')">权重配置</div>
            <div class="tab" onclick="switchTab('data')">数据管理</div>
        </div>

        <!-- 投资页面 -->
        <div id="invest" class="tab-content active">
            <div class="card">
                <div class="input-group">
                    <label>投资日期</label>
                    <input type="date" id="investDate" required>
                </div>
                <div class="input-group">
                    <label>投资金额 (元)</label>
                    <input type="number" id="investAmount" placeholder="请输入金额" min="0" step="0.01" required>
                </div>

                <div class="toggle-container" style="margin-top: 24px;">
                    <div class="toggle" id="customWeightToggle" onclick="toggleCustomWeight('invest')"></div>
                    <span class="toggle-label">使用自定义权重（默认使用当前配置）</span>
                </div>

                <div id="investWeightEditor" style="display: none;">
                    <div class="weight-editor">
                        <div class="section-title">调整投资权重配置</div>
                        <div id="investWeightInputs"></div>
                        <div class="weight-total" id="investWeightTotal">
                            <span>总权重</span>
                            <span id="investTotalPercent">0%</span>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="calculateAllocation()">计算配置方案</button>
                
                <div id="allocationResult" style="display: none; margin-top: 24px;">
                    <h3 style="margin-bottom: 16px; color: var(--text-muted); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">分配方案</h3>
                    <div class="allocation-grid" id="allocationGrid"></div>
                    <button class="btn btn-primary" onclick="confirmInvestment()" style="margin-top: 24px;">确认投资</button>
                </div>
            </div>
        </div>

        <!-- 再平衡页面 -->
        <div id="rebalance" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom: 20px; color: var(--text-muted); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">当前持仓</h3>
                <div class="current-holdings" id="currentHoldings"></div>

                <div class="toggle-container" style="margin-top: 24px;">
                    <div class="toggle" id="rebalanceWeightToggle" onclick="toggleCustomWeight('rebalance')"></div>
                    <span class="toggle-label">使用自定义目标权重（默认使用当前配置）</span>
                </div>

                <div id="rebalanceWeightEditor" style="display: none;">
                    <div class="weight-editor">
                        <div class="section-title">调整再平衡目标权重</div>
                        <div id="rebalanceWeightInputs"></div>
                        <div class="weight-total" id="rebalanceWeightTotal">
                            <span>总权重</span>
                            <span id="rebalanceTotalPercent">0%</span>
                        </div>
                    </div>
                </div>
                
                <button class="btn btn-primary" onclick="calculateRebalance()">计算再平衡方案</button>
                
                <div id="rebalanceResult" style="display: none;">
                    <div class="rebalance-result">
                        <h3 style="margin-bottom: 16px;">调仓建议</h3>
                        <div id="rebalanceList"></div>
                    </div>
                    <button class="btn btn-primary" onclick="confirmRebalance()" style="margin-top: 16px;">确认执行再平衡</button>
                </div>
            </div>
        </div>

        <!-- 历史记录页面 -->
        <div id="history" class="tab-content">
            <div class="card">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalInvested">¥0</div>
                        <div class="stat-label">累计投入</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="investCount">0</div>
                        <div class="stat-label">投资次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="rebalanceCount">0</div>
                        <div class="stat-label">再平衡次数</div>
                    </div>
                </div>
                
                <h3 style="margin-bottom: 16px; color: var(--text-muted); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">投资记录</h3>
                <div class="history-list" id="investHistory"></div>
                
                <h3 style="margin: 24px 0 16px; color: var(--text-muted); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">再平衡记录</h3>
                <div class="history-list" id="rebalanceHistory"></div>
            </div>
        </div>

        <!-- 权重配置页面 -->
        <div id="settings" class="tab-content">
            <div class="card">
                <div class="section-title">保存的配置方案</div>
                <div class="saved-schemes" id="savedSchemes"></div>
                
                <div class="custom-scheme-name">
                    <label>方案名称（可选）</label>
                    <input type="text" id="schemeName" placeholder="例如：保守型、激进型、2024策略">
                </div>

                <div class="preset-buttons">
                    <button class="preset-btn" onclick="loadPreset('default')">恢复默认</button>
                    <button class="preset-btn" onclick="loadPreset('equal')">等权重(12.5%)</button>
                    <button class="preset-btn" onclick="loadPreset('us_focus')">美股侧重</button>
                    <button class="preset-btn" onclick="loadPreset('asia_focus')">亚太侧重</button>
                </div>

                <div class="weight-editor">
                    <div class="section-title">资产配置权重设置</div>
                    <div id="settingsWeightInputs"></div>
                    <div class="weight-total" id="settingsWeightTotal">
                        <span>总权重</span>
                        <span id="settingsTotalPercent">0%</span>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="saveCurrentWeights()">保存为当前配置</button>
                <button class="btn btn-secondary" onclick="saveAsNewScheme()">保存为新方案</button>
            </div>
        </div>

        <!-- 数据管理页面 -->
        <div id="data" class="tab-content">
            <div class="card">
                <h3 style="margin-bottom: 20px;">数据导入导出</h3>
                <button class="btn btn-primary" onclick="exportData()">导出所有数据 (JSON)</button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">导入数据</button>
                <input type="file" id="importFile" style="display: none;" accept=".json" onchange="importData(this)">
                <button class="btn btn-secondary" onclick="clearAllData()" style="margin-top: 12px; color: var(--danger); border-color: var(--danger);">清空所有数据</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 默认资产配置
        const DEFAULT_TARGETS = {
            '标普500': { percent: 0.25, color: '#6366f1' },
            '纳斯达克100': { percent: 0.15, color: '#8b5cf6' },
            '日经225': { percent: 0.15, color: '#ec4899' },
            '德国DAX': { percent: 0.15, color: '#f43f5e' },
            '印度Nifty50': { percent: 0.10, color: '#f59e0b' },
            '越南VNIndex': { percent: 0.05, color: '#10b981' },
            'REITs': { percent: 0.10, color: '#3b82f6' },
            '中债备用': { percent: 0.05, color: '#64748b' }
        };

        // 预设配置
        const PRESETS = {
            default: DEFAULT_TARGETS,
            equal: {
                '标普500': { percent: 0.125, color: '#6366f1' },
                '纳斯达克100': { percent: 0.125, color: '#8b5cf6' },
                '日经225': { percent: 0.125, color: '#ec4899' },
                '德国DAX': { percent: 0.125, color: '#f43f5e' },
                '印度Nifty50': { percent: 0.125, color: '#f59e0b' },
                '越南VNIndex': { percent: 0.125, color: '#10b981' },
                'REITs': { percent: 0.125, color: '#3b82f6' },
                '中债备用': { percent: 0.125, color: '#64748b' }
            },
            us_focus: {
                '标普500': { percent: 0.35, color: '#6366f1' },
                '纳斯达克100': { percent: 0.25, color: '#8b5cf6' },
                '日经225': { percent: 0.10, color: '#ec4899' },
                '德国DAX': { percent: 0.10, color: '#f43f5e' },
                '印度Nifty50': { percent: 0.05, color: '#f59e0b' },
                '越南VNIndex': { percent: 0.05, color: '#10b981' },
                'REITs': { percent: 0.05, color: '#3b82f6' },
                '中债备用': { percent: 0.05, color: '#64748b' }
            },
            asia_focus: {
                '标普500': { percent: 0.15, color: '#6366f1' },
                '纳斯达克100': { percent: 0.10, color: '#8b5cf6' },
                '日经225': { percent: 0.25, color: '#ec4899' },
                '德国DAX': { percent: 0.10, color: '#f43f5e' },
                '印度Nifty50': { percent: 0.15, color: '#f59e0b' },
                '越南VNIndex': { percent: 0.15, color: '#10b981' },
                'REITs': { percent: 0.05, color: '#3b82f6' },
                '中债备用': { percent: 0.05, color: '#64748b' }
            }
        };

        // 当前使用的配置（运行时拷贝）
        let currentAllocationTargets = JSON.parse(JSON.stringify(DEFAULT_TARGETS));
        
        // 临时配置（用于投资和再平衡时的自定义）
        let tempInvestWeights = null;
        let tempRebalanceWeights = null;

        // IndexedDB 配置
        const DB_NAME = 'PortfolioDB';
        const DB_VERSION = 2; // 升级版本以支持保存的配置方案
        let db = null;

        // 初始化 IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    
                    if (!database.objectStoreNames.contains('investments')) {
                        const investStore = database.createObjectStore('investments', { keyPath: 'id', autoIncrement: true });
                        investStore.createIndex('date', 'date', { unique: false });
                    }
                    
                    if (!database.objectStoreNames.contains('rebalances')) {
                        const rebalanceStore = database.createObjectStore('rebalances', { keyPath: 'id', autoIncrement: true });
                        rebalanceStore.createIndex('date', 'date', { unique: false });
                    }

                    if (!database.objectStoreNames.contains('weightSchemes')) {
                        const schemeStore = database.createObjectStore('weightSchemes', { keyPath: 'id', autoIncrement: true });
                        schemeStore.createIndex('name', 'name', { unique: false });
                    }
                };
            });
        }

        // 数据库操作函数...
        function saveInvestment(data) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['investments'], 'readwrite');
                const store = transaction.objectStore('investments');
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function saveRebalance(data) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['rebalances'], 'readwrite');
                const store = transaction.objectStore('rebalances');
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function saveWeightScheme(data) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['weightSchemes'], 'readwrite');
                const store = transaction.objectStore('weightSchemes');
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function deleteWeightScheme(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['weightSchemes'], 'readwrite');
                const store = transaction.objectStore('weightSchemes');
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function getAllInvestments() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['investments'], 'readonly');
                const store = transaction.objectStore('investments');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function getAllRebalances() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['rebalances'], 'readonly');
                const store = transaction.objectStore('rebalances');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function getAllWeightSchemes() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['weightSchemes'], 'readonly');
                const store = transaction.objectStore('weightSchemes');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            
            const transaction = db.transaction(['investments', 'rebalances', 'weightSchemes'], 'readwrite');
            transaction.objectStore('investments').clear();
            transaction.objectStore('rebalances').clear();
            transaction.objectStore('weightSchemes').clear();
            
            transaction.oncomplete = () => {
                showToast('所有数据已清空');
                updateHistoryDisplay();
                loadSavedSchemes();
            };
        }

        // 导出数据
        async function exportData() {
            const investments = await getAllInvestments();
            const rebalances = await getAllRebalances();
            const schemes = await getAllWeightSchemes();
            
            const data = {
                exportDate: new Date().toISOString(),
                currentAllocation: currentAllocationTargets,
                investments: investments,
                rebalances: rebalances,
                savedSchemes: schemes
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `portfolio_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('数据导出成功');
        }

        // 导入数据
        async function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const data = JSON.parse(text);
                
                if (!confirm(`确定要导入数据吗？`)) {
                    input.value = '';
                    return;
                }
                
                // 导入当前配置
                if (data.currentAllocation) {
                    currentAllocationTargets = data.currentAllocation;
                }
                
                // 导入投资记录
                if (data.investments && data.investments.length > 0) {
                    const transaction = db.transaction(['investments'], 'readwrite');
                    const store = transaction.objectStore('investments');
                    data.investments.forEach(inv => {
                        delete inv.id;
                        store.add(inv);
                    });
                }
                
                // 导入再平衡记录
                if (data.rebalances && data.rebalances.length > 0) {
                    const transaction = db.transaction(['rebalances'], 'readwrite');
                    const store = transaction.objectStore('rebalances');
                    data.rebalances.forEach(reb => {
                        delete reb.id;
                        store.add(reb);
                    });
                }

                // 导入保存的方案
                if (data.savedSchemes && data.savedSchemes.length > 0) {
                    const transaction = db.transaction(['weightSchemes'], 'readwrite');
                    const store = transaction.objectStore('weightSchemes');
                    data.savedSchemes.forEach(sch => {
                        delete sch.id;
                        store.add(sch);
                    });
                }
                
                showToast('数据导入成功');
                updateHistoryDisplay();
                loadSavedSchemes();
                initWeightEditors();
                input.value = '';
            } catch (error) {
                alert('导入失败：' + error.message);
                input.value = '';
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'history') updateHistoryDisplay();
            if (tabName === 'rebalance') initRebalanceInputs();
            if (tabName === 'settings') {
                initWeightEditors();
                loadSavedSchemes();
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 初始化权重编辑器
        function initWeightEditors() {
            createWeightEditor('settings', currentAllocationTargets, (name, value) => {
                currentAllocationTargets[name].percent = value / 100;
                updateWeightTotal('settings', currentAllocationTargets);
            });

            // 初始化投资和再平衡的权重编辑器（使用当前配置作为默认值）
            createWeightEditor('invest', currentAllocationTargets, (name, value) => {
                if (!tempInvestWeights) tempInvestWeights = JSON.parse(JSON.stringify(currentAllocationTargets));
                tempInvestWeights[name].percent = value / 100;
                updateWeightTotal('invest', tempInvestWeights);
            });

            createWeightEditor('rebalance', currentAllocationTargets, (name, value) => {
                if (!tempRebalanceWeights) tempRebalanceWeights = JSON.parse(JSON.stringify(currentAllocationTargets));
                tempRebalanceWeights[name].percent = value / 100;
                updateWeightTotal('rebalance', tempRebalanceWeights);
            });

            updateWeightTotal('settings', currentAllocationTargets);
        }

        function createWeightEditor(prefix, targets, onChange) {
            const container = document.getElementById(`${prefix}WeightInputs`);
            container.innerHTML = '';
            
            Object.entries(targets).forEach(([name, config]) => {
                const item = document.createElement('div');
                item.className = 'weight-item';
                item.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 12px; height: 12px; border-radius: 50%; background: ${config.color};"></div>
                        <span style="font-weight: 500;">${name}</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="number" 
                               class="weight-input" 
                               value="${(config.percent * 100).toFixed(1)}" 
                               step="0.1" 
                               min="0" 
                               max="100"
                               onchange="handleWeightChange('${prefix}', '${name}', this.value)">
                        <span style="color: var(--text-muted);">%</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function handleWeightChange(prefix, name, value) {
            const numValue = parseFloat(value) || 0;
            
            if (prefix === 'settings') {
                currentAllocationTargets[name].percent = numValue / 100;
                updateWeightTotal('settings', currentAllocationTargets);
            } else if (prefix === 'invest') {
                if (!tempInvestWeights) tempInvestWeights = JSON.parse(JSON.stringify(currentAllocationTargets));
                tempInvestWeights[name].percent = numValue / 100;
                updateWeightTotal('invest', tempInvestWeights);
            } else if (prefix === 'rebalance') {
                if (!tempRebalanceWeights) tempRebalanceWeights = JSON.parse(JSON.stringify(currentAllocationTargets));
                tempRebalanceWeights[name].percent = numValue / 100;
                updateWeightTotal('rebalance', tempRebalanceWeights);
            }
        }

        function updateWeightTotal(prefix, targets) {
            const total = Object.values(targets).reduce((sum, t) => sum + t.percent, 0);
            const totalEl = document.getElementById(`${prefix}TotalPercent`);
            const container = document.getElementById(`${prefix}WeightTotal`);
            
            totalEl.textContent = (total * 100).toFixed(1) + '%';
            
            if (Math.abs(total - 1) < 0.001) {
                container.classList.remove('invalid');
                container.classList.add('valid');
            } else {
                container.classList.remove('valid');
                container.classList.add('invalid');
            }
            
            return total;
        }

        // 切换自定义权重
        function toggleCustomWeight(type) {
            const toggle = document.getElementById(`${type}WeightToggle`);
            const editor = document.getElementById(`${type}WeightEditor`);
            
            toggle.classList.toggle('active');
            
            if (toggle.classList.contains('active')) {
                editor.style.display = 'block';
                // 初始化临时权重
                if (type === 'invest' && !tempInvestWeights) {
                    tempInvestWeights = JSON.parse(JSON.stringify(currentAllocationTargets));
                    createWeightEditor('invest', tempInvestWeights);
                    updateWeightTotal('invest', tempInvestWeights);
                } else if (type === 'rebalance' && !tempRebalanceWeights) {
                    tempRebalanceWeights = JSON.parse(JSON.stringify(currentAllocationTargets));
                    createWeightEditor('rebalance', tempRebalanceWeights);
                    updateWeightTotal('rebalance', tempRebalanceWeights);
                }
            } else {
                editor.style.display = 'none';
                if (type === 'invest') tempInvestWeights = null;
                if (type === 'rebalance') tempRebalanceWeights = null;
            }
        }

        // 加载预设
        function loadPreset(presetName) {
            const preset = PRESETS[presetName];
            if (!preset) return;
            
            currentAllocationTargets = JSON.parse(JSON.stringify(preset));
            initWeightEditors();
            showToast(`已加载预设：${presetName}`);
        }

        // 保存当前权重
        function saveCurrentWeights() {
            const total = updateWeightTotal('settings', currentAllocationTargets);
            if (Math.abs(total - 1) > 0.001) {
                alert('权重总和必须等于100%才能保存');
                return;
            }
            
            // 保存到本地存储作为当前配置
            localStorage.setItem('currentAllocation', JSON.stringify(currentAllocationTargets));
            showToast('当前配置已保存');
        }

        // 保存为新方案
        async function saveAsNewScheme() {
            const total = updateWeightTotal('settings', currentAllocationTargets);
            if (Math.abs(total - 1) > 0.001) {
                alert('权重总和必须等于100%才能保存');
                return;
            }
            
            const name = document.getElementById('schemeName').value.trim();
            if (!name) {
                alert('请输入方案名称');
                return;
            }
            
            await saveWeightScheme({
                name: name,
                targets: JSON.parse(JSON.stringify(currentAllocationTargets)),
                createdAt: new Date().toISOString()
            });
            
            showToast(`方案 "${name}" 已保存`);
            document.getElementById('schemeName').value = '';
            loadSavedSchemes();
        }

        // 加载保存的方案列表
        async function loadSavedSchemes() {
            const schemes = await getAllWeightSchemes();
            const container = document.getElementById('savedSchemes');
            
            if (schemes.length === 0) {
                container.innerHTML = '<span style="color: var(--text-muted); font-size: 0.875rem;">暂无保存的方案</span>';
                return;
            }
            
            container.innerHTML = schemes.map(sch => `
                <div class="scheme-tag" onclick="applyScheme('${sch.name}')">
                    ${sch.name}
                    <span class="delete" onclick="event.stopPropagation(); deleteScheme(${sch.id})">×</span>
                </div>
            `).join('');
        }

        // 应用方案
        async function applyScheme(name) {
            const schemes = await getAllWeightSchemes();
            const scheme = schemes.find(s => s.name === name);
            if (scheme) {
                currentAllocationTargets = JSON.parse(JSON.stringify(scheme.targets));
                initWeightEditors();
                showToast(`已应用方案：${name}`);
            }
        }

        // 删除方案
        async function deleteScheme(id) {
            if (!confirm('确定要删除这个方案吗？')) return;
            await deleteWeightScheme(id);
            loadSavedSchemes();
            showToast('方案已删除');
        }

        // 计算资产配置
        let currentAllocation = null;
        let currentInvestData = null;

        function calculateAllocation() {
            const amount = parseFloat(document.getElementById('investAmount').value);
            const date = document.getElementById('investDate').value;
            
            if (!amount || amount <= 0 || !date) {
                alert('请输入有效的日期和金额');
                return;
            }
            
            // 确定使用哪种权重配置
            const useCustom = document.getElementById('customWeightToggle').classList.contains('active');
            const targets = useCustom && tempInvestWeights ? tempInvestWeights : currentAllocationTargets;
            
            // 验证权重总和
            const total = Object.values(targets).reduce((sum, t) => sum + t.percent, 0);
            if (Math.abs(total - 1) > 0.001) {
                alert(`当前权重总和为 ${(total * 100).toFixed(1)}%，必须等于100%才能计算`);
                return;
            }
            
            currentInvestData = { 
                date, 
                amount, 
                allocations: {},
                usedCustomWeights: useCustom,
                weightConfig: JSON.parse(JSON.stringify(targets))
            };
            currentAllocation = {};
            
            const grid = document.getElementById('allocationGrid');
            grid.innerHTML = '';
            
            Object.entries(targets).forEach(([name, config]) => {
                const allocatedAmount = (amount * config.percent).toFixed(2);
                currentAllocation[name] = parseFloat(allocatedAmount);
                currentInvestData.allocations[name] = parseFloat(allocatedAmount);
                
                const item = document.createElement('div');
                item.className = 'allocation-item';
                item.innerHTML = `
                    <div class="allocation-info">
                        <div class="allocation-name">${name}</div>
                        <div class="allocation-percent">${(config.percent * 100).toFixed(1)}%</div>
                    </div>
                    <div class="allocation-amount">¥${allocatedAmount}</div>
                `;
                item.style.borderLeft = `4px solid ${config.color}`;
                grid.appendChild(item);
            });
            
            document.getElementById('allocationResult').style.display = 'block';
        }

        // 确认投资
        async function confirmInvestment() {
            if (!currentInvestData) return;
            
            await saveInvestment({
                ...currentInvestData,
                timestamp: new Date().toISOString()
            });
            
            showToast('投资记录已保存');
            document.getElementById('investAmount').value = '';
            document.getElementById('allocationResult').style.display = 'none';
            currentAllocation = null;
            currentInvestData = null;
            
            // 重置自定义权重开关
            document.getElementById('customWeightToggle').classList.remove('active');
            document.getElementById('investWeightEditor').style.display = 'none';
            tempInvestWeights = null;
        }

        // 初始化再平衡输入
        function initRebalanceInputs() {
            const container = document.getElementById('currentHoldings');
            container.innerHTML = '';
            
            Object.keys(currentAllocationTargets).forEach(name => {
                const div = document.createElement('div');
                div.className = 'holding-input';
                div.innerHTML = `
                    <label>${name} 当前市值 (元)</label>
                    <input type="number" id="holding_${name}" placeholder="0.00" step="0.01" min="0">
                `;
                container.appendChild(div);
            });
            
            document.getElementById('rebalanceResult').style.display = 'none';
        }

        // 计算再平衡
        let currentRebalanceData = null;

        function calculateRebalance() {
            const holdings = {};
            let totalValue = 0;
            
            Object.keys(currentAllocationTargets).forEach(name => {
                const value = parseFloat(document.getElementById(`holding_${name}`).value) || 0;
                holdings[name] = value;
                totalValue += value;
            });
            
            if (totalValue === 0) {
                alert('请至少输入一项持仓市值');
                return;
            }
            
            // 确定使用哪种权重配置
            const useCustom = document.getElementById('rebalanceWeightToggle').classList.contains('active');
            const targets = useCustom && tempRebalanceWeights ? tempRebalanceWeights : currentAllocationTargets;
            
            // 验证权重总和
            const totalPercent = Object.values(targets).reduce((sum, t) => sum + t.percent, 0);
            if (Math.abs(totalPercent - 1) > 0.001) {
                alert(`当前权重总和为 ${(totalPercent * 100).toFixed(1)}%，必须等于100%才能计算`);
                return;
            }
            
            currentRebalanceData = {
                date: new Date().toISOString().split('T')[0],
                totalValue: totalValue,
                currentHoldings: {...holdings},
                adjustments: [],
                usedCustomWeights: useCustom,
                targetWeights: JSON.parse(JSON.stringify(targets))
            };
            
            const list = document.getElementById('rebalanceList');
            list.innerHTML = '';
            
            Object.entries(targets).forEach(([name, config]) => {
                const targetValue = totalValue * config.percent;
                const currentValue = holdings[name] || 0;
                const diff = targetValue - currentValue;
                const percent = ((currentValue / totalValue) * 100).toFixed(1);
                const targetPercent = (config.percent * 100).toFixed(1);
                
                let action, actionClass, actionText;
                if (Math.abs(diff) < 1) {
                    action = 'hold';
                    actionClass = 'action-hold';
                    actionText = '持有';
                } else if (diff > 0) {
                    action = 'buy';
                    actionClass = 'action-buy';
                    actionText = `买入 ¥${diff.toFixed(2)}`;
                } else {
                    action = 'sell';
                    actionClass = 'action-sell';
                    actionText = `卖出 ¥${Math.abs(diff).toFixed(2)}`;
                }
                
                currentRebalanceData.adjustments.push({
                    name,
                    currentValue,
                    targetValue,
                    diff,
                    action
                });
                
                const item = document.createElement('div');
                item.className = 'rebalance-item';
                item.innerHTML = `
                    <div>
                        <div style="font-weight: 600; margin-bottom: 4px;">${name}</div>
                        <div style="font-size: 0.875rem; color: var(--text-muted);">
                            当前: ¥${currentValue.toFixed(2)} (${percent}%) → 目标: ${targetPercent}%
                        </div>
                    </div>
                    <span class="action-badge ${actionClass}">${actionText}</span>
                `;
                list.appendChild(item);
            });
            
            document.getElementById('rebalanceResult').style.display = 'block';
        }

        // 确认再平衡
        async function confirmRebalance() {
            if (!currentRebalanceData) return;
            
            await saveRebalance({
                ...currentRebalanceData,
                timestamp: new Date().toISOString()
            });
            
            showToast('再平衡记录已保存');
            
            // 清空输入
            Object.keys(currentAllocationTargets).forEach(name => {
                document.getElementById(`holding_${name}`).value = '';
            });
            document.getElementById('rebalanceResult').style.display = 'none';
            currentRebalanceData = null;
            
            // 重置自定义权重开关
            document.getElementById('rebalanceWeightToggle').classList.remove('active');
            document.getElementById('rebalanceWeightEditor').style.display = 'none';
            tempRebalanceWeights = null;
        }

                    </div>
                `).join('');

            // 再平衡记录

            } else {
                rebalanceList.innerHTML = rebalances.slice().reverse().map(reb => `
                    <div class="history-item">
                        <div>
                            <div style="font-weight: 600;">${reb.date}</div>
                            <div style="font-size: 0.875rem; color: var(--text-muted); margin-top: 4px;">
                                ${reb.usedCustomWeights ? '⚙️ 自定义目标' : '使用默认配置'} | 
                                总资产: ¥${reb.totalValue.toFixed(2)}
                            </div>
                        </div>
                        <div style="color: var(--primary); font-weight: 600;">调整 ${reb.adjustments.length} 项</div>
                    </div>
                `).join('');
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 设置默认日期为今天
            document.getElementById('investDate').value = new Date().toISOString().split('T')[0];
            
            // 尝试从本地存储恢复当前配置
            const saved = localStorage.getItem('currentAllocation');
            if (saved) {
                currentAllocationTargets = JSON.parse(saved);
            }
            
            // 初始化数据库
            await initDB();
            
            // 初始化再平衡输入
            initRebalanceInputs();
        });

        // 注册 Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,' + encodeURIComponent(`
                self.addEventListener('install', e => self.skipWaiting());
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
            `)).catch(() => console.log('SW registration skipped'));
        }
    </script>
</body>
</html>
