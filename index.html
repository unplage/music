<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽心情 - 生活管理</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIue+juWbvOW/q+mAiSAtIOeUqOaIt+WuiSWFqCIsICJzaG9ydF9uYW1lIjogIue+juWbvOW/q+mAiSIsICJzdGFydF91cmwiOiAiLiIsICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLCAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwgInRoZW1lX2NvbG9yIjogIiNmZjZiNmIifQ==">
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --dark: #2d3436;
            --light: #f7f7f7;
            --text: #2d3436;
            --text-light: #636e72;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--light);
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.3);
        }
        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #ff8e8e 100%);
            color: white;
            padding: 40px 24px 30px;
            border-radius: 0 0 var(--radius) var(--radius);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
        }
        .date-display {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 400;
        }
        /* 导航标签 */
        .nav-tabs {
            display: flex;
            gap: 8px;
            padding: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .nav-tabs::-webkit-scrollbar {
            display: none;
        }
        .nav-tab {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: 25px;
            background: var(--light);
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        .nav-tab:hover {
            transform: translateY(-2px);
        }
        /* 内容区域 */
        .content {
            padding: 20px;
            padding-bottom: 100px;
        }
        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius-sm);
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255,107,107,0.1);
        }
        textarea.form-input {
            resize: vertical;
            min-height: 120px;
        }
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #ff8e8e 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,107,107,0.5);
        }
        .btn-secondary {
            background: var(--light);
            color: var(--text);
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }
        /* ========== 穿搭模块 ========== */
        .outfit-display {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius);
            color: white;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .outfit-emoji {
            font-size: 80px;
            margin-bottom: 16px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .outfit-desc {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .outfit-temp {
            font-size: 14px;
            opacity: 0.9;
        }
        .weather-input {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .weather-input .form-input {
            flex: 1;
        }
        /* ========== 衣橱管理 ========== */
        .closet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .closet-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .category-tag {
            background: var(--light);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .category-tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .closet-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding: 4px;
        }
        .closet-item-card {
            background: white;
            border-radius: var(--radius-sm);
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #e0e0e0;
            position: relative;
        }
        .closet-item-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
        }
        .closet-item-code {
            font-weight: 600;
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .remove-item {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #ffebee;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            color: #c62828;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* ========== 体重图表 ========== */
        .chart-container {
            height: 200px;
            margin: 20px 0;
            position: relative;
            background: var(--light);
            border-radius: var(--radius-sm);
            padding: 16px;
        }
        .weight-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            background: var(--light);
            padding: 16px;
            border-radius: var(--radius-sm);
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }
        /* ========== 生理期 ========== */
        .period-calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .calendar-header {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            padding: 8px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .calendar-day:hover {
            background: var(--light);
        }
        .calendar-day.period {
            background: var(--primary);
            color: white;
            font-weight: 600;
        }
        .calendar-day.predicted {
            background: #ffe0e0;
            color: var(--primary);
        }
        .calendar-day.today {
            border: 2px solid var(--primary);
        }
        .period-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            border-radius: var(--radius);
            color: white;
            margin-bottom: 20px;
        }
        .status-item {
            text-align: center;
        }
        .status-number {
            font-size: 36px;
            font-weight: 700;
        }
        .status-label {
            font-size: 12px;
            opacity: 0.9;
        }
        /* 生理期历史列表 */
        .period-history-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 16px;
        }
        .period-history-item {
            background: #fef0f7;
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
        }
        .period-history-dates {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .period-history-detail {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        /* ========== 日记 ========== */
        .diary-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .diary-item {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary);
        }
        .diary-item:hover {
            transform: translateX(4px);
        }
        .diary-date {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .diary-preview {
            font-size: 16px;
            color: var(--text);
            line-height: 1.5;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .diary-mood {
            margin-top: 12px;
            font-size: 20px;
        }
        .mood-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            justify-content: center;
        }
        .mood-btn {
            font-size: 32px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: grayscale(100%);
            opacity: 0.6;
        }
        .mood-btn:hover, .mood-btn.selected {
            transform: scale(1.2);
            filter: grayscale(0%);
            opacity: 1;
        }
        /* ========== 预留模块 ========== */
        .placeholder-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .placeholder-card {
            background: white;
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px dashed #e0e0e0;
        }
        .placeholder-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }
        .placeholder-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.6;
        }
        .placeholder-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
        }
        /* ========== 历史记录 ========== */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-date {
            font-size: 14px;
            color: var(--text-light);
        }
        .history-value {
            font-weight: 600;
            color: var(--primary);
        }
        .history-actions {
            display: flex;
            gap: 8px;
        }
        .edit-btn {
            background: none;
            border: none;
            color: #4ecdc4;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        .edit-btn:hover {
            color: #2c9b92;
        }
        .photo-icon {
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .photo-icon:hover {
            transform: scale(1.2);
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        /* ========== 底部导航 ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0 24px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            z-index: 1000;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-light);
        }
        .nav-item.active {
            color: var(--primary);
        }
        .nav-item-icon {
            font-size: 24px;
        }
        .nav-item-label {
            font-size: 11px;
            font-weight: 500;
        }
        /* ========== 模态框 ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
        }
        .modal-body {
            padding: 24px;
        }
        /* 图片查看模态框 */
        .photo-modal-content {
            background: transparent;
            max-width: 90%;
            text-align: center;
        }
        .photo-modal-content img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .photo-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.8);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 响应式 */
        @media (max-width: 480px) {
            .app-container {
                max-width: 100%;
            }
        }
        /* 动画 */
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>

<body>
    <div class="app-container">
        <!-- 头部 -->
        <div class="header">
            <h1>美丽心情</h1>
            <div class="date-display" id="currentDate"></div>
        </div>

        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" data-section="outfit">👔 穿搭</button>
            <button class="nav-tab" data-section="weight">⚖️ 体重</button>
            <button class="nav-tab" data-section="period">🌸 生理期</button>
            <button class="nav-tab" data-section="diary">📔 日记</button>
            <button class="nav-tab" data-section="more">➕ 更多</button>
        </div>

        <!-- 内容区域 -->
        <div class="content">
            <!-- 穿搭模块 -->
            <div class="section active" id="outfit-section">
                <div class="outfit-display" id="outfitDisplay">
                    <span class="outfit-emoji" id="outfitEmoji">👕</span>
                    <div class="outfit-desc" id="outfitDesc">今日穿搭建议</div>
                    <div class="outfit-temp" id="outfitTemp">请输入温度获取建议</div>
                </div>

                <div class="card">
                    <div class="card-title">
                        <div class="card-icon" style="background: #e3f2fd;">🌡️</div>
                        天气设置
                    </div>
                    <div class="weather-input">
                        <input type="number" class="form-input" id="tempInput" placeholder="温度 (°C)">
                        <select class="form-input" id="weatherCondition" style="flex: 0.8;">
                            <option value="sunny">☀️ 晴天</option>
                            <option value="cloudy">☁️ 多云</option>
                            <option value="rainy">🌧️ 雨天</option>
                            <option value="snowy">❄️ 雪天</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="generateOutfit()">生成穿搭建议</button>
                </div>

                <!-- 衣橱管理按钮 -->
                <div class="card">
                    <div class="card-title">
                        <div class="card-icon" style="background: #f3e5f5;">👚</div>
                        衣橱管理
                    </div>
                    <p style="color: var(--text-light); margin-bottom: 16px;">管理你的衣物，方便每日穿搭选择</p>
                    <button class="btn btn-primary btn-small" onclick="openClosetModal()">打开衣橱</button>
                </div>

                <div class="card">
                    <div class="card-title">
                        <div class="card-icon" style="background: #f3e5f5;">📸</div>
                        我的穿搭记录
                    </div>
                    <div class="form-group">
                        <label class="form-label">拍照或上传今日穿搭照片</label>
                        <input type="file" class="form-input" id="outfitPhoto" accept="image/*" capture="environment" onchange="previewOutfitPhoto(this)">
                    </div>
                    <div id="outfitPreview" style="margin-top: 12px; display: none;">
                        <img id="outfitImg" style="width: 100%; border-radius: 12px; max-height: 300px; object-fit: cover;">
                    </div>
                    <div class="form-group" style="margin-top: 16px;">
                        <label class="form-label">穿搭备注</label>
                        <input type="text" class="form-input" id="outfitNote" placeholder="记录今天的穿搭心得...">
                    </div>
                    <button class="btn btn-primary" onclick="saveOutfitRecord()">保存穿搭记录</button>

                    <div class="history-list" id="outfitHistory" style="margin-top: 20px;">
                        <!-- 历史记录将在这里显示 -->
                    </div>
                </div>
            </div>

            <!-- 体重模块（支持编辑） -->
            <div class="section" id="weight-section">
                <div class="card">
                    <div class="card-title">
                        <div class="card-icon" style="background: #e8f5e9;">📊</div>
                        体重记录
                    </div>
                    <div class="weight-stats">
                        <div class="stat-box">
                            <div class="stat-value" id="currentWeight">--</div>
                            <div class="stat-label">当前体重 (kg)</div>
                        </div>

    <script>
        // ========== IndexedDB 初始化 ==========
        const DB_NAME = 'LifeFlowDB';
        const DB_VERSION = 2;
        let db;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const database = event.target.result;

                    // 原有stores
                    if (!database.objectStoreNames.contains('outfits')) {
                        const outfitStore = database.createObjectStore('outfits', { keyPath: 'id', autoIncrement: true });
                        outfitStore.createIndex('date', 'date', { unique: false });
                    }

                    if (!database.objectStoreNames.contains('weight')) {
                        const weightStore = database.createObjectStore('weight', { keyPath: 'id', autoIncrement: true });
                        weightStore.createIndex('date', 'date', { unique: false });
                    }

                    if (!database.objectStoreNames.contains('periods')) {
                        const periodStore = database.createObjectStore('periods', { keyPath: 'id', autoIncrement: true });
                        periodStore.createIndex('startDate', 'startDate', { unique: false });
                    }

                    if (!database.objectStoreNames.contains('diaries')) {
                        const diaryStore = database.createObjectStore('diaries', { keyPath: 'id', autoIncrement: true });
                        diaryStore.createIndex('date', 'date', { unique: false });
                    }

                    // 衣橱分类和衣物
                    if (!database.objectStoreNames.contains('closetCategories')) {
                        const catStore = database.createObjectStore('closetCategories', { keyPath: 'id', autoIncrement: true });
                        catStore.createIndex('name', 'name', { unique: true });
                    }

                    if (!database.objectStoreNames.contains('clothes')) {
                        const clothesStore = database.createObjectStore('clothes', { keyPath: 'id', autoIncrement: true });
                        clothesStore.createIndex('categoryId', 'categoryId', { unique: false });
                        clothesStore.createIndex('code', 'code', { unique: false });
                    }
                };
            });
        };

        // ========== 数据库操作函数 ==========
        const addData = (storeName, data) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.add(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const getAllData = (storeName) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const deleteData = (storeName, id) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        };

        const updateData = (storeName, data) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const clearStore = (storeName) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.clear();
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        };

        const getDataByIndex = (storeName, indexName, value) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const index = store.index(indexName);
                const request = index.getAll(value);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const getDataById = (storeName, id) => {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.get(id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        // ========== 图片辅助函数 ==========
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        function base64ToBlob(base64) {
            return new Promise((resolve) => {
                const arr = base64.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) {
                    u8arr[n] = bstr.charCodeAt(n);
                }
                resolve(new Blob([u8arr], { type: mime }));
            });
        }

        function compressImage(file, maxWidth = 600, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            const compressedFile = new File([blob], file.name, { type: 'image/jpeg' });
                            resolve(compressedFile);
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ========== 穿搭建议逻辑 ==========
        const outfitSuggestions = {
            cold: { emoji: '🧥', desc: '寒冷天气 - 羽绒服/大衣', items: ['羽绒服', '毛衣', '围巾', '手套'] },
            cool: { emoji: '🧥', desc: '凉爽天气 - 外套/夹克', items: ['风衣', '长袖', '牛仔裤'] },
            mild: { emoji: '👕', desc: '舒适天气 - 长袖T恤/薄外套', items: ['长袖T恤', '薄外套', '长裤'] },
            warm: { emoji: '👔', desc: '温暖天气 - 短袖/衬衫', items: ['短袖', '衬衫', '休闲裤'] },
            hot: { emoji: '👗', desc: '炎热天气 - 短袖/裙子', items: ['短袖', '短裤', '裙子', '凉鞋'] }
        };

        function generateOutfit() {
            const temp = parseFloat(document.getElementById('tempInput').value);
            const condition = document.getElementById('weatherCondition').value;

            if (isNaN(temp)) {
                alert('请输入有效的温度');
                return;
            }

            let suggestion;
            if (temp < 5) suggestion = outfitSuggestions.cold;
            else if (temp < 15) suggestion = outfitSuggestions.cool;
            else if (temp < 22) suggestion = outfitSuggestions.mild;
            else if (temp < 28) suggestion = outfitSuggestions.warm;
            else suggestion = outfitSuggestions.hot;

            if (condition === 'rainy') {
                suggestion = { ...suggestion, emoji: '☔', desc: suggestion.desc + ' + 雨具' };
            } else if (condition === 'snowy') {
                suggestion = outfitSuggestions.cold;
            }

            document.getElementById('outfitEmoji').textContent = suggestion.emoji;
            document.getElementById('outfitDesc').textContent = suggestion.desc;
            document.getElementById('outfitTemp').textContent = `温度: ${temp}°C | 建议: ${suggestion.items.join(', ')}`;
        }

        function previewOutfitPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('outfitImg').src = e.target.result;
                    document.getElementById('outfitPreview').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveOutfitRecord() {
            const photo = document.getElementById('outfitImg').src;
            const note = document.getElementById('outfitNote').value;
            const temp = document.getElementById('tempInput').value;

            if (!photo && !note) {
                alert('请上传照片或填写备注');
                return;
            }

            const data = {
                date: new Date().toISOString().split('T')[0],
                photo: photo || '',
                note: note || '',
                temp: temp || '',
                timestamp: new Date().getTime()
            };

            await addData('outfits', data);
            alert('穿搭记录已保存！');
            loadOutfitHistory();

            document.getElementById('outfitPhoto').value = '';
            document.getElementById('outfitNote').value = '';
            document.getElementById('outfitPreview').style.display = 'none';
        }

        async function loadOutfitHistory() {
            const history = await getAllData('outfits');

        function drawWeightChart(records) {
            const canvas = document.getElementById('weightCanvas');
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            ctx.clearRect(0, 0, width, height);

            if (records.length < 2) {
                ctx.fillStyle = '#999';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('需要至少2条记录来显示趋势', width/2, height/2);
                return;
            }

            const weights = records.map(r => r.weight);
            const bodyFats = records.map(r => r.bodyFat).filter(f => f !== null && f !== undefined);
            
            const minWeight = Math.min(...weights) - 1;
            const maxWeight = Math.max(...weights) + 1;
            const weightRange = maxWeight - minWeight;

            let minFat = null, maxFat = null, fatRange = null;
            if (bodyFats.length > 0) {
                minFat = Math.min(...bodyFats) - 1;
                maxFat = Math.max(...bodyFats) + 1;
                fatRange = maxFat - minFat;
            }

            const padding = 40;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;

            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = padding + (chartHeight / 4) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }

            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 3;
            ctx.beginPath();

            records.forEach((record, index) => {
                const x = padding + (chartWidth / (records.length - 1)) * index;
                const y = padding + chartHeight - ((record.weight - minWeight) / weightRange) * chartHeight;

                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.stroke();

            records.forEach((record, index) => {
                const x = padding + (chartWidth / (records.length - 1)) * index;
                const y = padding + chartHeight - ((record.weight - minWeight) / weightRange) * chartHeight;

                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fill();
            });

            if (bodyFats.length > 0) {
                ctx.strokeStyle = '#4ecdc4';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 3]);
                ctx.beginPath();

                records.forEach((record, index) => {
                    if (record.bodyFat) {
                        const x = padding + (chartWidth / (records.length - 1)) * index;
                        const y = padding + chartHeight - ((record.bodyFat - minFat) / fatRange) * chartHeight;

                        if (index === 0 || !records[index-1].bodyFat) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                });

                ctx.stroke();
                ctx.setLineDash([]);

                records.forEach((record, index) => {
                    if (record.bodyFat) {
                        const x = padding + (chartWidth / (records.length - 1)) * index;
                        const y = padding + chartHeight - ((record.bodyFat - minFat) / fatRange) * chartHeight;

                        ctx.fillStyle = '#4ecdc4';
                        ctx.beginPath();
                        ctx.arc(x, y, 5, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });

                ctx.font = '12px sans-serif';
                ctx.fillStyle = '#ff6b6b';
                ctx.fillText('体重 (kg)', width - 110, 20);
                ctx.fillStyle = '#4ecdc4';
                ctx.fillText('体脂 (%)', width - 110, 40);
            } else {
                ctx.font = '12px sans-serif';
                ctx.fillStyle = '#ff6b6b';
                ctx.fillText('体重 (kg)', width - 90, 20);
            }
        }

            } else {

                const today = new Date();

                document.getElementById('cycleDay').textContent = diffDays + 1;

                const nextPeriod = new Date(lastDate);
                nextPeriod.setDate(nextPeriod.getDate() + 28);
                const daysUntil = Math.floor((nextPeriod - today) / (1000 * 60 * 60 * 24));
                document.getElementById('nextPeriod').textContent = daysUntil > 0 ? daysUntil + '天' : '已到来';

                let html = '';
                periods.slice(0, 10).forEach(p => {
                    const start = p.startDate;
                    const end = p.endDate || '未记录';
                    let duration = '';
                    if (p.endDate) {
                        const s = new Date(p.startDate);
                        const e = new Date(p.endDate);
                        const d = Math.ceil((e - s) / (1000 * 60 * 60 * 24)) + 1;
                        duration = ` (${d}天)`;
                    }
                    html += `
                        <div class="period-history-item">
                            <div class="period-history-dates">${start} 至 ${end}${duration}</div>
                            <div class="period-history-detail">症状: ${p.symptoms?.join('、') || '无'}</div>

                });
                document.getElementById('periodHistory').innerHTML = html;
            }

        function generateCalendar(periods) {
            const calendar = document.getElementById('periodCalendar');
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            let html = weekDays.map(d => `<div class="calendar-header">${d}</div>`).join('');

            for (let i = 0; i < firstDay; i++) {
                html += '<div></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = day === today.getDate();

                const isPeriod = periods.some(p => {
                    const start = new Date(p.startDate);
                    const end = p.endDate ? new Date(p.endDate) : new Date(start);
                    end.setDate(end.getDate() + 5);
                    const current = new Date(dateStr);
                    return current >= start && current <= end;
                });

                let isPredicted = false;
                if (periods.length > 0) {
                    const lastPeriod = periods[0];
                    const lastStart = new Date(lastPeriod.startDate);
                    const predictedStart = new Date(lastStart);
                    predictedStart.setDate(predictedStart.getDate() + 28);
                    const predictedEnd = new Date(predictedStart);
                    predictedEnd.setDate(predictedEnd.getDate() + 5);
                    const current = new Date(dateStr);
                    if (current >= predictedStart && current <= predictedEnd) {
                        isPredicted = true;
                    }
                }

                let className = 'calendar-day';
                if (isToday) className += ' today';
                if (isPeriod) className += ' period';
                if (isPredicted && !isPeriod) className += ' predicted';

                html += `<div class="${className}">${day}</div>`;
            }

            calendar.innerHTML = html;
        }

                alert('正在准备导出数据，请稍候...');
                const stores = ['outfits', 'weight', 'periods', 'diaries', 'clothes', 'closetCategories'];
                const exportObj = {};

                            return item;
                        }));
                    }
                    exportObj[store] = data;
                }
                exportObj.exportDate = new Date().toISOString();
        
                const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });

        // ========== 导入数据（兼容优化） ==========
        async function importData(input) {
            const file = input.files[0];
            if (!file) return;
        
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!imported.outfits || !imported.weight || !imported.periods || !imported.diaries || !imported.clothes || !imported.closetCategories) {
                        alert('无效的数据文件');
                        return;
                    }
        
                    if (!confirm('导入将覆盖当前所有数据，确定继续？')) return;
        
                    const stores = ['outfits', 'weight', 'periods', 'diaries', 'clothes', 'closetCategories'];
                    for (const store of stores) {
                        await clearStore(store);
                    }
        
                    for (const store of stores) {
                        const items = imported[store];
                        for (const item of items) {
                            const { id, ...rest } = item;
                            if (store === 'clothes' && rest.imageBlob && typeof rest.imageBlob === 'string') {
                                // 将 base64 转回 Blob
                                rest.imageBlob = await base64ToBlob(rest.imageBlob);
                            }
                            await addData(store, rest);
                        }
                    }
        
                    alert('数据导入成功！');
                    const activeSection = document.querySelector('.nav-tab.active').dataset.section;
                    if (activeSection === 'outfit') loadOutfitHistory();
                    if (activeSection === 'weight') loadWeightData();
                    if (activeSection === 'period') loadPeriodData();
                    if (activeSection === 'diary') loadDiaries();
                } catch (err) {
                    alert('导入失败：' + err.message);
                } finally {
                    input.value = '';
                }
            };
            reader.readAsText(file);
        }

            clothes.forEach(item => {
                let imgUrl = '';
                if (item.imageBlob) {
                    imgUrl = URL.createObjectURL(item.imageBlob);
                }
                html += `
                    <div class="closet-item-card">
                        <img src="${imgUrl || 'https://via.placeholder.com/70'}" alt="衣物">
                        <div class="closet-item-code">${item.code}</div>
                        <button class="remove-item" onclick="deleteClothes(${item.id})">✕</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function showAddCategory() {
            document.getElementById('addCategoryModal').classList.add('active');
        }

        async function addCategory() {
            const name = document.getElementById('newCategoryName').value.trim();
            if (!name) {
                alert('请输入分类名称');
                return;
            }
            const existing = await getDataByIndex('closetCategories', 'name', name);
            if (existing.length > 0) {
                alert('分类名称已存在');
                return;
            }
            await addData('closetCategories', { name });
            document.getElementById('newCategoryName').value = '';
            closeModalById('addCategoryModal');
            loadClosetCategories();
        }

        function showAddClothes() {
            if (!currentCategoryId) {
                alert('请先选择一个分类');
                return;
            }
            const select = document.getElementById('clothesCategory');
            select.innerHTML = '';
            getAllData('closetCategories').then(cats => {
                cats.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    if (cat.id === currentCategoryId) option.selected = true;
                    select.appendChild(option);
                });
            });
            document.getElementById('addClothesModal').classList.add('active');
        }

        async function addClothes() {
            const categoryId = parseInt(document.getElementById('clothesCategory').value);
            const code = document.getElementById('clothesCode').value.trim();
            const fileInput = document.getElementById('clothesImage');
            if (!code) {
                alert('请输入衣物代码');
                return;
            }
            if (!fileInput.files[0]) {
                alert('请上传照片');
                return;
            }

            const compressedFile = await compressImage(fileInput.files[0], 600, 0.8);
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                const blob = dataURLToBlob(e.target.result);
                const clothesData = {
                    categoryId: categoryId,
                    code: code,
                    imageBlob: blob,
                    timestamp: new Date().getTime()
                };
                await addData('clothes', clothesData);
                document.getElementById('clothesCode').value = '';
                document.getElementById('clothesImage').value = '';
                closeModalById('addClothesModal');
                loadClothesByCategory(currentCategoryId);
            };
            reader.readAsDataURL(compressedFile);
        }

        function dataURLToBlob(dataURL) {
            const arr = dataURL.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) {
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new Blob([u8arr], { type: mime });
        }

        async function deleteClothes(id) {
            if (confirm('确定删除这件衣物吗？')) {
                await deleteData('clothes', id);
                loadClothesByCategory(currentCategoryId);
            }
        }
    </script>
</body>
</html>
